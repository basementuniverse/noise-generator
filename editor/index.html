    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noise Graph Editor</title>
    <link rel="stylesheet" href="main.css" />
    <script src="e2.min.js"></script>
    <script src="chart.js"></script>
    <script src="noise.js"></script>
    <script src="graph-builder.js"></script>
    <script src="utils.min.js"></script>
    <script src="editor.js"></script>
  </head>

              <e2-toolbar-separator></e2-toolbar-separator>

                    action="new-node"

              <e2-toolbar-separator></e2-toolbar-separator>
              <e2-toolbar-button

                label="Step"

              ></e2-toolbar-button>

                id="settings-button"
                label="Settings"
                icon="⚙️"
                action="settings"
              ></e2-toolbar-button>

                <span class="slider" data-off="🌞" data-on="🌙"></span>
              </label>

          <!-- Main editor area -->
          <section class="main">

            <!-- Editor canvas -->
            <section class="content">
              <canvas id="editor-canvas" class="has-nodes"></canvas>
            </section>

            <!-- Properties panel -->
            <aside class="properties">
              <e2-collapsible-panel
                orientation="horizontal"
                resize-left
                collapsed
              >
                <span slot="title" id="properties-title">Node Properties</span>
                <div class="properties-container">
                  <e2-keyvalue-editor id="node-editor"></e2-keyvalue-editor>
                </div>
              </e2-collapsible-panel>
            </aside>

            <!-- History panel -->
            <aside class="history">
              <e2-collapsible-panel
                orientation="horizontal"
                resize-left
                collapsed
              >
                <span slot="title">History</span>
                <e2-list-view
                  id="history-list"
                  view-mode="details"
                ></e2-list-view>
              </e2-collapsible-panel>
            </aside>
          </section>

          <!-- Status bar-->
          <footer>
            <e2-status-bar id="status-bar">
              <e2-status-section slot="left" position="left">
                <e2-status-item
                  id="selected-status"
                  type="indicator"
                  label="Selected"
                  value="None"
                ></e2-status-item>
                <e2-status-item
                  id="mouse-status"
                  type="text"
                  label="Mouse"
                  value="(0, 0)"
                ></e2-status-item>
              </e2-status-section>
              <e2-status-section slot="right" position="right">
                <e2-toolbar-button
                  id="snap-all-to-grid-toolbar-button"
                  label="Snap All to Grid"
                  icon="📐"
                  action="snap-all-to-grid"
                ></e2-toolbar-button>
                <e2-toolbar-button
                  id="reset-camera-toolbar-button"
                  label="Reset Camera"
                  icon="🎯"
                  action="reset-camera"
                ></e2-toolbar-button>
                <e2-status-item
                  id="camera-status"
                  type="text"
                  label="Camera"
                  value="(0, 0)"
                ></e2-status-item>
                <e2-status-item
                  id="zoom-status"
                  type="text"
                  label="Zoom"
                  value="100%"
                ></e2-status-item>
              </e2-status-section>
            </e2-status-bar>
          </footer>
        </section>
